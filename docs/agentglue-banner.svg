  </g>

  <text x="120" y="170" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="112" font-weight="800">AgentGlue</text>
  <text x="122" y="236" fill="#2563EB" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Middleware orchestration for multi-agent systems</text>
  <text x="122" y="294" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="30">Coordinate shared work across agents, tools, and processes.</text>

  <g filter="url(#shadow)">
    <rect x="620" y="252" width="340" height="246" rx="34" fill="url(#glue)"/>
  </g>
