      <feColorMatrix type="matrix" values="0 0 0 0 0.227 0 0 0 0 0.369 0 0 0 0 0.749 0 0 0 0.18 0"/>
      <feBlend in2="SourceGraphic" result="shape"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>

  <g opacity="0.6" filter="url(#blur)">
