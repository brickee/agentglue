  <text x="116" y="188" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="700">AgentGlue</text>
  <text x="118" y="244" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600">A runtime layer for multi-agent tool coordination</text>
  <text x="118" y="296" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="26">Deduplicate identical tool calls. Share cache across agents. Keep the system honest.</text>

