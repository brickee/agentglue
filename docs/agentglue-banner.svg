    <circle cx="620" cy="454" r="10" fill="#60A5FA"/>
    <circle cx="1188" cy="372" r="10" fill="#60A5FA"/>
    <circle cx="1188" cy="510" r="10" fill="#60A5FA"/>
    <circle cx="1188" cy="648" r="10" fill="#60A5FA"/>
