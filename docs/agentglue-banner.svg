    <text x="243" y="410" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Agent A</text>

    <rect x="180" y="496" width="210" height="84" rx="24" fill="#FFFFFF" stroke="#D6E4FF"/>
    <text x="243" y="548" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Agent B</text>

