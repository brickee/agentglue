<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="40" x2="1500" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="glowA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#BAE6FD"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="glowB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="glue" x1="642" y1="258" x2="958" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="shadow" x="570" y="220" width="460" height="350" filterUnits="userSpaceOnUse">
      <feOffset dy="18"/>
