  <text x="476" y="394" fill="#A5B4FC" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Cross-process cache</text>
  <text x="476" y="435" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">SQLite sidecar</text>

  <rect x="768" y="350" width="392" height="108" rx="18" fill="#111827" stroke="#1F2937"/>
  <text x="796" y="394" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">OpenClaw integration</text>
  <text x="796" y="435" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">npm install + plugin</text>

